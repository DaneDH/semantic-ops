<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="55%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- background tile -->
  <rect x="0" y="0" width="512" height="512" rx="104" fill="url(#bgGrad)"/>

  <!-- ascending step path connecting the three version nodes -->
  <path d="M 148 356 L 148 296 L 256 296 L 256 216 L 364 216 L 364 156"
        fill="none" stroke="url(#markGrad)" stroke-width="18"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- patch node (small) -->
  <circle cx="148" cy="356" r="30" fill="url(#markGrad)"/>
  <!-- minor node (medium) -->
  <circle cx="256" cy="296" r="38" fill="url(#markGrad)"/>
  <!-- major node (large) -->
  <circle cx="364" cy="216" r="46" fill="url(#markGrad)"/>

  <!-- upward increment chevron above the major node -->
  <path d="M 364 128 L 392 160 L 336 160 Z" fill="url(#markGrad)"/>
</svg>
