main_branch: main
tag_prefix: v
default_bump: patch
precedence: commit-first
default_postfix: ""
initial_version: "1.0.0"     # first release on a channel with no prior tag -- used as-is, no bump applied
create_release: false         # false = tag only, no GitHub Release (e.g. to leave a tag free for manual Marketplace publishing)

branch_rules:
  major:
    - '^release/major/'
  minor:
    - '^feature/'
    - '^release/minor/'
  patch:
    - '^hotfix/'
    - '^bugfix/'
    - '^patch/'
    - '^doc/'

commit_rules:
  major:
    - '^BREAKING CHANGE'
    - '!:'
  minor:
    - '^feat(\(.+\))?:'
    - '^feature/'
  patch:
    - '^fix(\(.+\))?:'
    - '^doc(\(.+\))?:'
    - '^patch(\(.+\))?:'

branch_postfix_rules:
  - pattern: '^alpha/|/alpha$'
    postfix: alpha
  - pattern: '^beta/|/beta$'
    postfix: beta
  - pattern: '^feature/|/feature$'
    postfix: beta
  - pattern: '^patch/|/patch$'
    postfix: beta
  - pattern: '^fix/|/fix$'
    postfix: beta
